<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DarkPad Pro">
    <meta name="theme-color" content="#050a0f">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkRhcmtQYWQgUHJvIiwKICAic2hvcnRfbmFtZSI6ICJEUCBQUk8iLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzA1MGEwZiIsCiAgInRoZW1lX2NvbG9yIjogIiMwNTBhMGYiLAogICJpY29ucyI6IFsKICAgIHsKICAgICAgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8yOTY1LzI5NjUxNzIucG5nIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciCiAgICB9CiAgXQp9">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2965/2965172.png">

    <title>Dark Pad Pro V18.3</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #050a0f; 
            color: #e2e8f0; 
            font-family: system-ui, sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            user-select: none;
            padding-top: env(safe-area-inset-top);
        }
        .bg-pure-black { background-color: #000000 !important; }
        
        /* Colores de notas */
        .c-slate { background-color: #1e293b !important; } .c-zinc { background-color: #27272a !important; }
        .c-red { background-color: #7f1d1d !important; } .c-orange { background-color: #7c2d12 !important; }
        .c-green { background-color: #064e3b !important; } .c-sky { background-color: #0c4a6e !important; }
        .c-blue { background-color: #1e3a8a !important; } .c-rose { background-color: #881337 !important; }
        .c-gray { background-color: #4a5568 !important; }

        .modal-container { 
            width: 96%; max-width: 500px; height: 94vh;
            border-radius: 3.5rem; overflow: hidden; display: flex; flex-direction: column; 
            border: 1px solid rgba(255,255,255,0.15); 
            backdrop-filter: blur(20px);
        }

        /* Alarma visual mejorada */
        .wake-strobe { animation: strobe-bg 0.15s infinite; }
        @keyframes strobe-bg { 
            0%, 100% { background-color: #000; box-shadow: inset 0 0 100px #f15a02; } 
            50% { background-color: #f15a02; box-shadow: inset 0 0 150px #000; } 
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        input, textarea { user-select: text !important; }
        
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-action { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-action:active { transform: scale(0.92); filter: brightness(1.2); }

        .firma-medbasha { font-family: serif; font-style: italic; opacity: 0.4; letter-spacing: 1px; }
    </style>
</head>
<body x-data="notesApp()" x-init="init()" :class="config.pureBlack ? 'bg-pure-black' : ''">

    <template x-if="activeAlarm">
        <div class="fixed inset-0 z-[9999] flex flex-col items-center justify-center wake-strobe p-6">
            <div class="bg-black/95 p-12 rounded-[4rem] border-4 border-white text-center shadow-2xl">
                <span class="material-symbols-outlined text-[120px] text-white animate-bounce">notifications_active</span>
                <h2 class="text-5xl font-black text-white mt-6 uppercase italic">¡ALERTA!</h2>
                <p class="text-orange-500 font-black text-3xl mt-4" x-text="activeAlarm.titulo || 'RECORDATORIO'"></p>
                <button @click="stopAlarm()" class="mt-12 bg-white text-black px-20 py-8 rounded-3xl font-black text-3xl btn-action shadow-[0_0_30px_rgba(255,255,255,0.5)]">PARAR ALARMA</button>
                <p class="mt-6 text-white/30 firma-medbasha text-sm">medbasha</p>
            </div>
        </div>
    </template>

    <header class="p-6 pb-2 sticky top-0 z-50 bg-inherit border-b border-white/5">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-2xl font-black text-orange-500 italic uppercase">Dark Pad <span class="text-white">Pro</span></h1>
                <p class="text-[10px] font-black text-sky-500 uppercase tracking-[0.2em]">V18.3 - PERSONAL</p>
            </div>
            <div class="flex items-center gap-3">
                <span class="firma-medbasha text-xs">medbasha</span>
                <button @click="ui.showSettings = true" class="p-4 glass rounded-full"><span class="material-symbols-outlined text-sky-400 text-3xl">settings</span></button>
            </div>
        </div>
        
        <div class="flex items-center justify-between glass p-3 rounded-2xl">
            <div class="flex items-center gap-2">
                <button @click="ui.showSearch = !ui.showSearch" class="p-2 text-sky-400"><span class="material-symbols-outlined text-2xl">search</span></button>
                <input x-show="ui.showSearch" x-model="search" type="text" placeholder="Buscar..." class="w-32 bg-transparent outline-none text-base text-white">
            </div>
            <div class="flex gap-4 text-sky-400">
                <button @click="ui.showFullCalendar = true" class="p-2"><span class="material-symbols-outlined text-3xl">calendar_month</span></button>
                <button @click="selectedDate = null; search = ''" class="p-2 opacity-30"><span class="material-symbols-outlined text-3xl">restart_alt</span></button>
            </div>
        </div>
    </header>

    <section class="px-4 py-4 bg-white/5 overflow-x-auto whitespace-nowrap hide-scrollbar flex gap-3">
        <template x-for="day in recentDays" :key="day.dateStr">
            <button @click="selectedDate = (selectedDate === day.dateStr ? null : day.dateStr)" 
                 class="flex flex-col items-center min-w-[70px] p-4 rounded-[2rem] transition-all border-2"
                 :class="selectedDate === day.dateStr ? 'bg-sky-600 border-sky-400 text-white' : 'glass border-transparent text-white/40'">
                <span class="text-[9px] uppercase font-black" x-text="day.weekday"></span>
                <span class="text-xl font-black" x-text="day.dayNum"></span>
                <div x-show="day.hasNote" class="w-1.5 h-1.5 bg-orange-500 rounded-full mt-1"></div>
            </button>
        </template>
    </section>

    <main class="p-5 grid grid-cols-1 sm:grid-cols-2 gap-5 h-[calc(100vh-280px)] overflow-y-auto pb-48 hide-scrollbar">
        <template x-for="nota in notasFiltradas" :key="nota.id">
            <div @click="abrirNota(nota)" class="p-6 min-h-[140px] rounded-[3rem] flex flex-col justify-between border border-white/5 shadow-xl btn-action" :class="[nota.estilo, nota.pinned ? 'ring-2 ring-orange-500' : '']">
                <div>
                    <h4 class="text-[10px] font-black uppercase opacity-60 mb-2 tracking-widest" x-text="nota.titulo || 'SIN TÍTULO'"></h4>
                    <p class="font-bold leading-tight line-clamp-3 text-lg" x-text="nota.type === 'checklist' ? '✓ Checklist' : (nota.texto || 'Vacío...')"></p>
                </div>
                <div class="flex justify-between items-center opacity-60 text-[10px] font-black mt-4">
                    <span x-text="nota.fecha"></span>
                    <span x-show="nota.reminderTime" class="material-symbols-outlined text-xl text-orange-400">alarm</span>
                </div>
            </div>
        </template>
    </main>

    <div class="fixed bottom-10 right-6 z-[300] flex flex-col items-end gap-4">
        <div x-show="ui.showFabMenu" x-transition x-cloak class="flex flex-col gap-3">
            <button @click="nuevaNota('checklist')" class="bg-sky-600 text-white px-8 py-5 rounded-[2rem] font-black text-xs uppercase shadow-2xl flex items-center gap-2">Lista <span class="material-symbols-outlined">fact_check</span></button>
            <button @click="nuevaNota('note')" class="bg-orange-600 text-white px-8 py-5 rounded-[2rem] font-black text-xs uppercase shadow-2xl flex items-center gap-2">Nota <span class="material-symbols-outlined">edit_note</span></button>
        </div>
        <button @click="ui.showFabMenu = !ui.showFabMenu" class="w-16 h-16 bg-white text-black rounded-[2rem] flex items-center justify-center shadow-2xl btn-action" :class="ui.showFabMenu ? 'rotate-45 !bg-red-600 !text-white' : ''">
            <span class="material-symbols-outlined text-4xl font-black">add</span>
        </button>
    </div>

    <div x-show="notaExpandida" x-transition x-cloak class="fixed inset-0 bg-black/90 z-[400] flex items-center justify-center backdrop-blur-xl p-4">
        <div class="modal-container shadow-2xl" :class="notaExpandida?.estilo">
            <div class="p-4 bg-black/40 border-b border-white/10">
                <div class="grid grid-cols-5 gap-2 mb-4">
                    <button @click="insertarDato('INICIO')" class="bg-sky-500 text-white py-3 rounded-2xl text-[10px] font-black uppercase btn-action">H. Inicio</button>
                    <button @click="insertarDato('FIN')" class="bg-red-500 text-white py-3 rounded-2xl text-[10px] font-black uppercase btn-action">H. Fin</button>
                    <button @click="insertarDato('BUS')" class="bg-orange-500 text-white py-3 rounded-2xl text-[10px] font-black uppercase btn-action">Bus #</button>
                    <button @click="insertarDato('KM_I')" class="bg-emerald-500 text-white py-3 rounded-2xl text-[10px] font-black uppercase btn-action">Km Ini</button>
                    <button @click="insertarDato('KM_F')" class="bg-emerald-700 text-white py-3 rounded-2xl text-[10px] font-black uppercase btn-action">Km Fin</button>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-[10px] font-black opacity-50 uppercase tracking-widest" x-text="notaExpandida?.fecha"></span>
                    <button @click="cerrarNota()" class="w-10 h-10 bg-black/20 rounded-full flex items-center justify-center btn-action"><span class="material-symbols-outlined">close</span></button>
                </div>
            </div>
            
            <div class="flex-grow p-6 overflow-y-auto hide-scrollbar">
                <input x-model="notaExpandida.titulo" @input="guardar()" class="w-full bg-transparent mb-6 font-black text-2xl outline-none placeholder:opacity-30" placeholder="TÍTULO...">
                <template x-if="notaExpandida?.type === 'note'">
                    <textarea x-model="notaExpandida.texto" @input="guardar()" class="w-full h-full bg-transparent outline-none resize-none font-bold text-xl leading-relaxed" :style="{ fontSize: (notaExpandida?.textSize || 20) + 'px' }" placeholder="Escribe aquí..."></textarea>
                </template>
                <template x-if="notaExpandida?.type === 'checklist'">
                    <div class="space-y-3 pb-10">
                        <template x-for="(item, index) in notaExpandida.items">
                            <div class="glass p-4 rounded-2xl flex items-center gap-3">
                                <button @click="item.done = !item.done; guardar()" :class="item.done ? 'text-green-400' : 'opacity-30'"><span class="material-symbols-outlined" x-text="item.done ? 'check_circle' : 'circle'"></span></button>
                                <input x-model="item.text" @input="guardar()" class="bg-transparent outline-none flex-grow font-bold" :class="item.done ? 'line-through opacity-40' : ''">
                                <button @click="notaExpandida.items.splice(index, 1); guardar()" class="opacity-10"><span class="material-symbols-outlined">delete</span></button>
                            </div>
                        </template>
                        <button @click="notaExpandida.items.push({text: '', done: false})" class="w-full p-4 border-2 border-dashed border-white/10 rounded-2xl text-[10px] font-black opacity-30 uppercase">+ Añadir Elemento</button>
                    </div>
                </template>
            </div>

            <div x-show="ui.showAlarmPanel" class="p-6 bg-black/60 border-t border-orange-500/30">
                <div class="flex justify-between items-center mb-4"><span class="text-[10px] font-black text-orange-400 uppercase">Aviso de Alarma</span><button @click="notaExpandida.reminderTime = null; guardar(); ui.showAlarmPanel = false" class="text-xs text-red-500 underline">Quitar</button></div>
                <input type="time" x-model="notaExpandida.reminderTime" @change="guardar()" class="bg-white/10 p-6 rounded-3xl w-full text-white font-black text-5xl outline-none text-center">
            </div>

            <div class="p-8 flex justify-around border-t border-white/10 bg-black/40">
                <button @click="ui.showAlarmPanel = !ui.showAlarmPanel" :class="notaExpandida?.reminderTime ? 'text-orange-500' : 'opacity-30'"><span class="material-symbols-outlined text-3xl">alarm</span></button>
                <button @click="ciclarTexto()" class="opacity-40 font-black text-lg uppercase">AA</button>
                <button @click="ciclarColor()" class="opacity-40"><span class="material-symbols-outlined text-3xl">palette</span></button>
                <button @click="notaExpandida.pinned = !notaExpandida.pinned; guardar()" :class="notaExpandida?.pinned ? 'text-sky-400' : 'opacity-30'"><span class="material-symbols-outlined text-3xl">push_pin</span></button>
                <button @click="borrarNota()" class="opacity-10"><span class="material-symbols-outlined text-3xl">delete</span></button>
            </div>
        </div>
    </div>

    <div x-show="ui.showFullCalendar" x-transition x-cloak class="fixed inset-0 bg-black/95 z-[500] flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm rounded-[3rem] p-8">
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black uppercase text-sky-400 text-xs tracking-widest">Calendario</h2>
                <button @click="ui.showFullCalendar = false" class="p-2"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="grid grid-cols-7 gap-2">
                <template x-for="day in fullMonthDays" :key="day.dateStr">
                    <button @click="crearDesdeCalendario(day.dateStr)" class="aspect-square flex flex-col items-center justify-center rounded-xl text-[10px] font-black" :class="selectedDate === day.dateStr ? 'bg-sky-500 text-white' : 'glass text-white/40'">
                        <span x-text="day.dayNum"></span>
                        <div x-show="day.hasNote" class="w-1 h-1 bg-orange-500 rounded-full mt-1"></div>
                    </button>
                </template>
            </div>
        </div>
    </div>

    <div x-show="ui.showSettings" x-transition x-cloak class="fixed inset-0 bg-[#050a0f] z-[600] p-10">
        <div class="flex justify-between items-center mb-12"><h2 class="text-2xl font-black uppercase italic">Ajustes</h2><button @click="ui.showSettings = false" class="bg-white text-black px-6 py-2 rounded-full text-[10px] font-black uppercase">Cerrar</button></div>
        <div class="space-y-6">
            <button @click="exportar()" class="w-full glass p-6 rounded-3xl font-black text-xs flex justify-between items-center uppercase">Exportar Backup <span class="material-symbols-outlined">download</span></button>
            <button @click="$refs.fileInput.click()" class="w-full glass p-6 rounded-3xl font-black text-xs flex justify-between items-center uppercase">Importar Backup <span class="material-symbols-outlined">upload</span></button>
            <input type="file" x-ref="fileInput" class="hidden" @change="importar($event)">
            <button @click="config.pureBlack = !config.pureBlack; guardar()" class="w-full glass p-6 rounded-3xl font-black text-xs flex justify-between items-center uppercase">Modo OLED <span class="bg-sky-500 px-4 py-1 rounded-full" x-text="config.pureBlack ? 'ON' : 'OFF'"></span></button>
            <div class="text-center pt-20"><span class="firma-medbasha text-lg text-white">medbasha</span></div>
        </div>
    </div>

    <script>
        function notesApp() {
            return {
                notas: [], notaExpandida: null, search: '', selectedDate: null, activeAlarm: null, 
                vibrationInterval: null,
                ui: { showSearch: false, showSettings: false, showAlarmPanel: false, showFullCalendar: false, showFabMenu: false },
                config: { pureBlack: false }, 
                estilos: ['c-slate', 'c-zinc', 'c-red', 'c-orange', 'c-green', 'c-sky', 'c-blue', 'c-rose', 'c-gray'],

                init() {
                    this.notas = JSON.parse(localStorage.getItem('darkpad_v18')) || [];
                    this.config = JSON.parse(localStorage.getItem('darkpad_conf_v18')) || { pureBlack: false };
                    
                    setInterval(() => {
                        const d = new Date();
                        const h = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
                        const f = d.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'});
                        this.notas.forEach(n => { 
                            if (n.reminderTime === h && n.fecha === f) { 
                                this.startAlarm(n); 
                            } 
                        });
                    }, 1000); // Revisión cada segundo para precisión
                },

                // ALARMA MEJORADA CON VIBRACIÓN
                startAlarm(nota) { 
                    if (this.activeAlarm) return;
                    this.activeAlarm = nota; 
                    nota.reminderTime = null; 
                    this.guardar(); 
                    
                    // Iniciar vibración persistente
                    if ("vibrate" in navigator) {
                        this.vibrationInterval = setInterval(() => {
                            navigator.vibrate([500, 300, 500]);
                        }, 1300);
                    }
                },
                stopAlarm() { 
                    this.activeAlarm = null; 
                    if (this.vibrationInterval) {
                        clearInterval(this.vibrationInterval);
                        navigator.vibrate(0); // Detener vibración inmediatamente
                    }
                },

                // TU LÓGICA DE DATOS DE BUS MANTENIDA
                insertarDato(tipo) {
                    const ahora = new Date();
                    const hora = ahora.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    if (this.notaExpandida.texto.length > 0 && !this.notaExpandida.texto.endsWith('\n')) {
                        this.notaExpandida.texto += '\n';
                    }
                    switch(tipo) {
                        case 'INICIO': this.notaExpandida.texto += `[INICIO: ${hora}] `; break;
                        case 'FIN': this.notaExpandida.texto += `[FIN: ${hora}] `; break;
                        case 'BUS': 
                            const b = prompt("Nº Bus:");
                            if(b) this.notaExpandida.texto += `[BUS: ${b}] `;
                            break;
                        case 'KM_I':
                            const ki = prompt("KM Inicio:");
                            if(ki) this.notaExpandida.texto += `[KM INICIO: ${ki}] `;
                            break;
                        case 'KM_F':
                            const kf = prompt("KM Fin:");
                            if(kf) this.notaExpandida.texto += `[KM FIN: ${kf}] `;
                            break;
                    }
                    this.guardar();
                },

                nuevaNota(tipo) { 
                    const h = new Date().toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'});
                    const n = { 
                        id: Date.now(), type: tipo, titulo: '', texto: '', 
                        items: (tipo === 'checklist' ? [{text:'', done:false}] : []), 
                        fecha: h, estilo: 'c-slate', pinned: false, reminderTime: null, textSize: 20
                    };
                    this.notas.unshift(n); 
                    this.guardar(); 
                    this.abrirNota(n);
                    this.ui.showFabMenu = false;
                },
                abrirNota(n) { this.notaExpandida = n; this.ui.showAlarmPanel = false; },
                cerrarNota() { this.guardar(); this.notaExpandida = null; },
                guardar() { 
                    localStorage.setItem('darkpad_v18', JSON.stringify(this.notas)); 
                    localStorage.setItem('darkpad_conf_v18', JSON.stringify(this.config)); 
                },
                borrarNota() { if(confirm("¿Borrar nota?")) { this.notas = this.notas.filter(n => n.id !== this.notaExpandida.id); this.cerrarNota(); } },
                ciclarTexto() { const s = [18, 22, 28, 36]; let i = s.indexOf(this.notaExpandida.textSize || 20); this.notaExpandida.textSize = s[(i+1)%s.length]; this.guardar(); },
                ciclarColor() { let i = this.estilos.indexOf(this.notaExpandida.estilo); this.notaExpandida.estilo = this.estilos[(i+1)%this.estilos.length]; this.guardar(); },
                
                get recentDays() { 
                    const days = []; 
                    for(let i=0; i<14; i++) { 
                        const d = new Date(); d.setDate(d.getDate()-i); 
                        const s = d.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'}); 
                        days.push({ dateStr: s, dayNum: d.getDate(), weekday: d.toLocaleDateString('es-ES', {weekday:'short'}), hasNote: this.notas.some(n => n.fecha === s)}); 
                    } 
                    return days; 
                },
                get fullMonthDays() { 
                    const days = []; 
                    for(let i=30; i>=0; i--) { 
                        const d = new Date(); d.setDate(new Date().getDate()-i); 
                        const s = d.toLocaleDateString('es-ES', {day:'2-digit', month:'2-digit'}); 
                        days.push({ dateStr: s, dayNum: d.getDate(), hasNote: this.notas.some(n => n.fecha === s)}); 
                    } 
                    return days; 
                },
                get notasFiltradas() { 
                    return this.notas.filter(n => 
                        (n.texto + (n.titulo || '')).toLowerCase().includes(this.search.toLowerCase()) && 
                        (!this.selectedDate || n.fecha === this.selectedDate)
                    ).sort((a,b) => b.pinned - a.pinned || b.id - a.id); 
                },
                exportar() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(this.notas)], {type:'application/json'})); a.download = 'darkpad_v18.3.json'; a.click(); },
                importar(e) { const r = new FileReader(); r.onload = (f) => { this.notas = JSON.parse(f.target.result); this.guardar(); location.reload(); }; r.readAsText(e.target.files[0]); }
            }
        }
    </script>
</body>
</html>
